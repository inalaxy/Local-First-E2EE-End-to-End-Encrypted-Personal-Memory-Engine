name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # Changed from ubuntu-latest to ubuntu-22.04 to fix the libtinfo5 error
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache Buildozer global directory
      uses: actions/cache@v4
      with:
        path: .buildozer_global
        key: buildozer-global-${{ hashFiles('buildozer.spec') }}

    - name: Build Android APK with Buildozer
      uses: digreatbrian/buildozer-action@v2
      # This environment variable auto-accepts the SDK licenses during the build process
      env:
        ACCEPT_SDK_LICENSE: "yes"
      with:
        python-version: '3.10'
        buildozer-cmd: buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: L1MemoryEngine-Android-APK
        path: ./bin/*.apk
